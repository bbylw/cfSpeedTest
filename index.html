<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="一个优雅的 Cloudflare IP 优选工具聚合页面，集成了多个数据源的测速结果" />
  <title>CloudflareSpeedTest 优选IP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
  <style>
    :root {
      --ph-orange: #ff9000;
      --ph-orange-light: #ffb347;
      --ph-black: #000000;
      --ph-dark: #121212;
      --ph-gray: #1e1e1e;
      --ph-gray-light: #2d2d2d;
      --ph-blue: #3a86ff;
      --ph-purple: #8338ec;
      --ph-text: #f8f9fa;
      --ph-text-secondary: #adb5bd;
      --ph-card-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      --ph-transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --ph-gradient: linear-gradient(135deg, var(--ph-dark) 0%, #000000 100%);
      --ph-gradient-accent: linear-gradient(135deg, var(--ph-orange) 0%, var(--ph-orange-light) 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--ph-gradient);
      color: var(--ph-text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      line-height: 1.6;
      transition: var(--ph-transition);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px 15px;
      position: relative;
    }

    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      color: var(--ph-text);
      padding: 10px 20px;
      border-radius: 8px;
      word-break: break-word;
      display: inline-block;
      position: relative;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      letter-spacing: -0.5px;
      background: linear-gradient(45deg, #ff9000, #ff5e62, #ff9000);
      background-size: 200% 200%;
      animation: gradient 5s ease infinite;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 60px;
      height: 4px;
      background: var(--ph-gradient-accent);
      transform: translateX(-50%);
      border-radius: 2px;
      transition: var(--ph-transition);
    }

    .logo:hover::after {
      width: 100px;
    }

    .logo span {
      background: var(--ph-gradient-accent);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
    }

    .source-links {
      text-align: center;
      margin: 30px auto;
      padding: 20px;
      background: var(--ph-gray);
      border-radius: 12px;
      max-width: 800px;
      box-shadow: var(--ph-card-shadow);
      position: relative;
      overflow: hidden;
      transition: var(--ph-transition);
      transform: translateY(0);
    }

    .source-links::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--ph-gradient-accent);
    }

    .source-links:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
    }

    .source-links a {
      color: var(--ph-orange);
      text-decoration: none;
      margin: 0 15px;
      padding: 10px 20px;
      border: 2px solid var(--ph-orange);
      border-radius: 8px;
      transition: var(--ph-transition);
      display: inline-block;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .source-links a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--ph-gradient-accent);
      transition: var(--ph-transition);
      z-index: -1;
    }

    .source-links a:hover {
      color: var(--ph-black);
      border-color: transparent;
    }

    .source-links a:hover::before {
      left: 0;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin: 30px auto;
      max-width: 1600px;
    }

    .content-container {
      background: var(--ph-gray);
      border-radius: 12px;
      overflow: hidden;
      height: 800px;
      box-shadow: var(--ph-card-shadow);
      transition: var(--ph-transition);
      transform: translateY(0);
      position: relative;
    }

    .content-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .content-title {
      background: var(--ph-gradient-accent);
      color: var(--ph-black);
      padding: 15px 20px;
      font-weight: 600;
      text-align: center;
      font-size: clamp(14px, 3vw, 16px);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(0, 0, 0, 0.1);
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: calc(100% - 50px);
      overflow: hidden;
    }

    .iframe-loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--ph-gray-light);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: opacity 0.5s ease;
    }

    .iframe-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid var(--ph-gray);
      border-bottom-color: var(--ph-orange);
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--ph-gray);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ph-gray-light);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ph-orange);
    }

    /* 动画效果 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header,
    .source-links,
    .content-grid {
      animation: fadeIn 0.8s ease-out forwards;
    }

    .source-links {
      animation-delay: 0.2s;
    }

    .content-grid {
      animation-delay: 0.4s;
    }

    @media (max-width: 1024px) {
      body {
        padding: 15px;
      }

      .content-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .source-links {
        padding: 15px;
        margin: 20px auto;
      }

      .source-links a {
        display: block;
        margin: 15px auto;
        max-width: 300px;
        font-size: 15px;
      }

      .content-container {
        height: 600px;
      }

      .content-title {
        padding: 12px 15px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .header {
        margin-bottom: 20px;
      }

      .content-container {
        height: 500px;
      }

      .source-links a {
        padding: 8px 15px;
        font-size: 14px;
      }
    }
    
    /* WeTest API Table Styles */
    .wetest-table-container {
      padding: 15px;
      height: 100%;
      overflow-y: auto;
      background: var(--ph-gray);
    }

    .wetest-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
      color: var(--ph-text);
    }

    .wetest-table tr {
      border-bottom: 1px solid var(--ph-gray-light);
      transition: background 0.2s;
    }

    .wetest-table tr:hover {
      background: var(--ph-gray-light);
    }

    .wetest-table th {
      padding: 12px 8px;
      border-bottom: 2px solid var(--ph-gray-light);
      color: var(--ph-text-secondary);
      font-weight: 600;
    }

    .wetest-table td {
      padding: 12px 8px;
      vertical-align: middle;
    }

    .wetest-line {
      font-weight: 600;
      color: var(--ph-orange);
    }

    .wetest-ip {
      font-family: monospace;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .wetest-copy-btn {
      color: var(--ph-blue);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(58, 134, 255, 0.1);
      border: 1px solid rgba(58, 134, 255, 0.2);
      transition: var(--ph-transition);
    }

    .wetest-copy-btn:hover {
      background: rgba(58, 134, 255, 0.2);
    }

    .wetest-latency {
      font-weight: 600;
      color: #4caf50;
    }

    .wetest-fallback {
      padding: 40px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--ph-text);
    }

    .wetest-fallback-icon {
      font-size: 56px;
      margin-bottom: 15px;
      color: var(--ph-orange);
      animation: pulse 2s infinite;
    }

    .wetest-fallback h3 {
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 18px;
      color: var(--ph-text);
    }

    .wetest-fallback p {
      color: var(--ph-text-secondary);
      max-width: 340px;
      font-size: 13px;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .wetest-fallback-btn {
      display: inline-flex;
      align-items: center;
      padding: 12px 24px;
      background: var(--ph-gradient-accent);
      color: var(--ph-black);
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255, 144, 0, 0.4);
      transition: var(--ph-transition);
    }

    .wetest-fallback-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 144, 0, 0.6);
    }

    .wetest-footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: var(--ph-text-secondary);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">Cloudflare<span>SpeedTest</span></div>
  </div>

  <div class="source-links">
    <a href="https://ip.164746.xyz/" target="_blank">
      <i class='bx bx-link-external'></i> 访问 CF Speed DNS 源站
    </a>
    <a href="https://ipdb.030101.xyz/" target="_blank">
      <i class='bx bx-link-external'></i> 访问 ipdb 源站
    </a>
    <a href="https://www.wetest.vip/page/cloudflare/address_v4.html" target="_blank">
      <i class='bx bx-link-external'></i> 访问 WeTest 源站
    </a>
  </div>

  <div class="content-grid">
    <div class="content-container">
      <div class="content-title">
        <i class='bx bx-refresh'></i> 优选IP (自动更新)
      </div>
      <div class="iframe-container">
        <div class="iframe-loader" id="loader1">
          <span class="loader"></span>
        </div>
        <iframe src="https://ip.164746.xyz/" title="CF Speed DNS" id="iframe1"
          onload="this.classList.add('loaded'); document.getElementById('loader1').classList.add('hidden');"></iframe>
      </div>
    </div>
    <div class="content-container">
      <div class="content-title">
        <i class='bx bx-radar'></i> 优选IP (WeTest)
      </div>
      <div class="iframe-container" id="wetest-container">
        <div class="iframe-loader" id="loader2">
          <span class="loader"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const container = document.getElementById('wetest-container');
      const loader = document.getElementById('loader2');
      
      const targetUrl = 'https://www.wetest.vip/api/cf2dns/get_cloudflare_ip?key=o1zrmHAF&type=v4';
      
      // List of CORS proxies to try
      const proxies = [
        url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];
      
      let proxyIndex = 0;
      
      function tryFetch() {
        if (proxyIndex >= proxies.length) {
          showFallback();
          return;
        }
        
        const proxyUrl = proxies[proxyIndex](targetUrl);
        fetch(proxyUrl)
          .then(response => {
            if (!response.ok) throw new Error('Network response not ok');
            return response.json();
          })
          .then(data => {
            let result = data;
            // allorigins wraps response in a stringified JSON contents
            if (data && data.contents) {
              try {
                result = JSON.parse(data.contents);
              } catch (e) {
                throw new Error('Failed to parse allorigins contents');
              }
            }
            
            if (result && result.status && result.code === 200 && result.info) {
              renderTable(result.info);
            } else {
              throw new Error('Invalid data structure');
            }
          })
          .catch(error => {
            console.warn(`Proxy ${proxyIndex} failed:`, error);
            proxyIndex++;
            tryFetch();
          });
      }
      
      function renderTable(info) {
        if (loader) loader.style.display = 'none';
        
        let allIps = [];
        const lines = {
          'CM': '移动',
          'CU': '联通',
          'CT': '电信',
          'CN': '三网'
        };
        
        for (let key in info) {
          if (info.hasOwnProperty(key)) {
            const lineName = lines[key] || key;
            const items = Array.isArray(info[key]) ? info[key] : [];
            items.forEach(item => {
              allIps.push({
                line: lineName,
                ip: item.ip,
                bandwidth: item.bandwidth ? `${item.bandwidth} MB` : '-',
                speed: item.speed ? `${item.speed} kB/s` : '-',
                latency: item.rtt_avg ? `${item.rtt_avg} ms` : '-',
                colo: item.colo || '-'
              });
            });
          }
        }
        
        if (allIps.length === 0) {
          showFallback();
          return;
        }
        
        // Sort by line type and then latency
        const lineOrder = { '电信': 1, '联通': 2, '移动': 3, '三网': 4 };
        allIps.sort((a, b) => {
          const orderA = lineOrder[a.line] || 99;
          const orderB = lineOrder[b.line] || 99;
          if (orderA !== orderB) return orderA - orderB;
          return parseInt(a.latency) - parseInt(b.latency);
        });
        
        let html = `
          <div class="wetest-table-container">
            <table class="wetest-table">
              <thead>
                <tr>
                  <th>线路</th>
                  <th>优选地址</th>
                  <th>带宽</th>
                  <th>峰值</th>
                  <th>延迟</th>
                  <th>节点</th>
                </tr>
              </thead>
              <tbody>
        `;
        
        allIps.forEach(item => {
          html += `
            <tr>
              <td class="wetest-line">${item.line}</td>
              <td>
                <div class="wetest-ip">
                  <span>${item.ip}</span>
                  <span class="wetest-copy-btn" onclick="copyText('${item.ip}')">复制</span>
                </div>
              </td>
              <td>${item.bandwidth}</td>
              <td>${item.speed}</td>
              <td class="wetest-latency">${item.latency}</td>
              <td style="color: var(--ph-text-secondary);">${item.colo}</td>
            </tr>
          `;
        });
        
        html += `
              </tbody>
            </table>
            <div class="wetest-footer">
              数据源于 WeTest.vip 官方 API (每15分钟更新)
            </div>
          </div>
        `;
        
        container.innerHTML = html;
      }
      
      window.copyText = function(text) {
        navigator.clipboard.writeText(text).then(() => {
          alert('已复制 IP: ' + text);
        }).catch(err => {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            alert('已复制 IP: ' + text);
          } catch (e) {
            console.error('Copy failed:', e);
          }
          document.body.removeChild(textarea);
        });
      };
      
      function showFallback() {
        if (loader) loader.style.display = 'none';
        container.innerHTML = `
          <div class="wetest-fallback">
            <div class="wetest-fallback-icon">
              <i class='bx bx-shield-quarter'></i>
            </div>
            <h3>无法直接加载 WeTest 数据</h3>
            <p>
              由于 WeTest 官方源站启用了安全性同源策略 (X-Frame-Options)，浏览器拒绝了在此 iframe 中加载其网页。
            </p>
            <a href="https://www.wetest.vip/page/cloudflare/address_v4.html" target="_blank" class="wetest-fallback-btn">
              <i class='bx bx-link-external' style="margin-right: 8px; font-size: 18px;"></i> 访问 WeTest 官方源站
            </a>
          </div>
        `;
      }
      
      tryFetch();
    });
  </script>
</body>

</html>
